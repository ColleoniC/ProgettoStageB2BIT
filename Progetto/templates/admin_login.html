<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login Admin</title>
</head>
<body>
    <h1>Login Amministratore</h1>
    <form action="/admin/login" method="POST">
        <label>Nome utente:
            <input type="text" name="nome" required>
        </label><br><br>
        <label>Password:
            <input type="password" name="password" required>
        </label><br><br>
        <button type="submit">Accedi</button>
    </form>
</body>
</html>
