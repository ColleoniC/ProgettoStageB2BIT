<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="top-bar">
        <a class="brand" href="/">Timbrature</a>
        <span class="sub">Accesso amministratore</span>
    </div>

    <div class="page">
        <div class="card">
            <h1>Login Amministratore</h1>
            <p>Area riservata alla gestione degli utenti e delle timbrature aziendali.</p>

            <form action="/admin/login" method="POST">
                <label class="field">Nome utente
                    <input type="text" name="nome" required autocomplete="username">
                </label>
                <label class="field">Password
                    <input type="password" name="password" required autocomplete="current-password">
                </label>
                <button type="submit" class="btn btn-primary">Accedi</button>
            </form>

            <div class="links">
                <a href="/login">Sei un dipendente? Accedi qui →</a>
            </div>
        </div>
    </div>
</body>
</html>
