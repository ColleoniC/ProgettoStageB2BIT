<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Modifica utente</title>
</head>
<body>
    <h1>Modifica utente</h1>
    <form action="/admin/modifica/{{ user.id }}" method="POST">
        <label>Nome <input type="text" name="nome" value="{{ user.name }}" required></label><br>
        <label>Cognome <input type="text" name="cognome" value="{{ user.cognome }}" required></label><br>
        <label>Email <input type="email" name="email" value="{{ user.email }}" required></label><br>
        <label>Orario inizio <input type="time" name="orario_inizio" value="{{ user.orario_inizio }}"></label><br>
        <label>Orario pausa inizio <input type="time" name="orario_pausa_inizio" value="{{ user.orario_pausa_inizio }}"></label><br>
        <label>Orario pausa fine <input type="time" name="orario_pausa_fine" value="{{ user.orario_pausa_fine }}"></label><br>
        <label>Orario fine <input type="time" name="orario_fine" value="{{ user.orario_fine }}"></label><br>
        <button type="submit">Salva</button>
    </form>
    <p><a href="/admin/panel">← Torna al pannello</a></p>
</body>
</html>
