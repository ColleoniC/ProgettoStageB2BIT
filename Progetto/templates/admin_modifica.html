<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Modifica utente</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="top-bar">
        <a class="brand" href="/admin/panel">Timbrature <span class="sub">admin</span></a>
    </div>

    <div class="page">
        <div class="card">
            <h1>Modifica utente</h1>
            <p>Aggiorna i dati anagrafici e l'orario previsto.</p>

            <form action="/admin/modifica/{{ user.id }}" method="POST">
                <div class="field-row">
                    <label class="field">Nome
                        <input type="text" name="nome" value="{{ user.name }}" required>
                    </label>
                    <label class="field">Cognome
                        <input type="text" name="cognome" value="{{ user.cognome }}" required>
                    </label>
                </div>

                <label class="field">Email
                    <input type="email" name="email" value="{{ user.email }}" required>
                </label>

                <div class="field-row">
                    <label class="field">Orario di inizio
                        <input type="time" name="orario_inizio" value="{{ user.orario_inizio }}">
                    </label>
                    <label class="field">Orario di fine
                        <input type="time" name="orario_fine" value="{{ user.orario_fine }}">
                    </label>
                </div>

                <div class="field-row">
                    <label class="field">Inizio pausa pranzo
                        <input type="time" name="orario_pausa_inizio" value="{{ user.orario_pausa_inizio }}">
                    </label>
                    <label class="field">Fine pausa pranzo
                        <input type="time" name="orario_pausa_fine" value="{{ user.orario_pausa_fine }}">
                    </label>
                </div>

                <button type="submit" class="btn btn-primary">Salva modifiche</button>
            </form>

            <div class="links">
                <a href="/admin/panel">← Torna al pannello</a>
            </div>
        </div>
    </div>
</body>
</html>
