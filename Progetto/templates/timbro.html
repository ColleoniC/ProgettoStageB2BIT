<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Timbratura</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="top-bar">
        <a class="brand" href="/timbro">Timbrature</a>
        {% if is_admin %}
        <a class="sub" href="/admin/panel" style="color:#EDE7D9; text-decoration:none;">← Torna al pannello admin</a>
        {% endif %}
        <form action="/logout" method="POST">
            <button type="submit" class="btn btn-outline btn-small">Esci</button>
        </form>
    </div>

    <div class="page">
        {% if is_admin %}
        <p style="text-align:center; color: var(--text-dim); font-size:0.85rem; margin-bottom:14px;">
            Modalità anteprima admin: la timbratura non viene registrata.
        </p>
        {% endif %}
        <div class="punch-card">
            <span id="timer">00:00:00</span>

            <button id="startBtn" class="btn btn-start">START</button>

            <div id="controls" style="display: none;">
                <div class="controls-row">
                    <button id="pauseBtn" class="btn">PAUSA</button>
                    <button id="stopBtn" class="btn">STOP</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const controls = document.getElementById('controls');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const timerDisplay = document.getElementById('timer');

        let intervalId = null;
        let secondsElapsed = 0;
        let isPaused = false;

        function formatTime(totalSeconds) {
            const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
            const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            const s = String(totalSeconds % 60).padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function startTimer() {
            intervalId = setInterval(() => {
                secondsElapsed++;
                timerDisplay.textContent = formatTime(secondsElapsed);
            }, 1000);
        }

        function registraTimbratura(tipo) {
            fetch('/timbro/azione', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'tipo=' + encodeURIComponent(tipo)
            }).catch(() => {
                // In caso di errore di rete la timbratura non viene registrata;
                // il timer locale continua comunque a funzionare.
            });
        }

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            controls.style.display = 'block';
            startTimer();
            registraTimbratura('entrata');
        });

        pauseBtn.addEventListener('click', () => {
            if (!isPaused) {
                clearInterval(intervalId);
                pauseBtn.textContent = 'RIPRENDI';
                isPaused = true;
                registraTimbratura('pausa_inizio');
            } else {
                startTimer();
                pauseBtn.textContent = 'PAUSA';
                isPaused = false;
                registraTimbratura('pausa_fine');
            }
        });

        stopBtn.addEventListener('click', () => {
            clearInterval(intervalId);
            secondsElapsed = 0;
            isPaused = false;
            timerDisplay.textContent = '00:00:00';
            pauseBtn.textContent = 'PAUSA';
            controls.style.display = 'none';
            startBtn.style.display = 'inline-block';
            registraTimbratura('uscita');
        });
    </script>
</body>
</html>
