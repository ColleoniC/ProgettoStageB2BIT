<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cambia password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="top-bar">
        <a class="brand" href="/timbro">Timbrature</a>
        <span class="sub">Cambia password</span>
    </div>

    <div class="page">
        <div class="card">
            <h1>Cambia password</h1>
            <p>Scegli una nuova password per il tuo account.</p>

            {% if errore %}
            <div class="toast toast-errore toast-visible" style="position:static; margin:0 0 20px;">{{ errore }}</div>
            {% endif %}
            {% if successo %}
            <div class="toast toast-successo toast-visible" style="position:static; margin:0 0 20px;">{{ successo }}</div>
            {% endif %}

            <form action="/account/password" method="POST">
                <label class="field">Password attuale
                    <div class="password-field">
                        <input type="password" id="password_attuale" name="password_attuale" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('password_attuale', this)" aria-label="Mostra password">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                                <line class="eye-slash" x1="3" y1="3" x2="21" y2="21"></line>
                            </svg>
                        </button>
                    </div>
                </label>
                <label class="field">Nuova password
                    <div class="password-field">
                        <input type="password" id="nuova_password" name="nuova_password" required minlength="8" autocomplete="new-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('nuova_password', this)" aria-label="Mostra password">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                                <line class="eye-slash" x1="3" y1="3" x2="21" y2="21"></line>
                            </svg>
                        </button>
                    </div>
                </label>
                <label class="field">Conferma nuova password
                    <div class="password-field">
                        <input type="password" id="conferma_password" name="conferma_password" required minlength="8" autocomplete="new-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('conferma_password', this)" aria-label="Mostra password">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                                <line class="eye-slash" x1="3" y1="3" x2="21" y2="21"></line>
                            </svg>
                        </button>
                    </div>
                </label>
                <button type="submit" class="btn btn-primary">Aggiorna password</button>
            </form>

            <div class="links">
                <a href="/timbro">← Torna alla timbratura</a>
            </div>
        </div>
    </div>
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const eraNascosta = input.type === 'password';
            input.type = eraNascosta ? 'text' : 'password';
            btn.classList.toggle('is-visible', eraNascosta);
            btn.setAttribute('aria-label', eraNascosta ? 'Nascondi password' : 'Mostra password');
        }
    </script>
</body>
</html>
