<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="top-bar">
        <a class="brand" href="/">Timbrature</a>
        <span class="sub">Accesso dipendente</span>
    </div>

    <div class="page">
        <div class="card">
            <h1>Accedi</h1>
            <p>Inserisci le tue credenziali per registrare le timbrature.</p>

            <form action="/login" method="POST">
                <label class="field">Email
                    <input type="email" name="email" required autocomplete="username">
                </label>
                <label class="field">Password
                    <div class="password-field">
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('password', this)" aria-label="Mostra password">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                                <line class="eye-slash" x1="3" y1="3" x2="21" y2="21"></line>
                            </svg>
                        </button>
                    </div>
                </label>
                <button type="submit" class="btn btn-primary">Accedi</button>
            </form>

            <div class="links">
                <a href="/admin/login">Sei amministratore? Accedi qui →</a>
            </div>
        </div>
    </div>
    <footer class="site-footer">
        <a href="/privacy">Informativa sulla privacy</a>
    </footer>
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const eraNascosta = input.type === 'password';
            input.type = eraNascosta ? 'text' : 'password';
            btn.classList.toggle('is-visible', eraNascosta);
            btn.setAttribute('aria-label', eraNascosta ? 'Nascondi password' : 'Mostra password');
        }
    </script>
</body>
</html>
